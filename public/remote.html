<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050511">
<title>Deck remote · AI-PE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #050511;
    --bg-2: #0d0d22;
    --bg-3: #151532;
    --ink: #f5f5f0;
    --ink-2: #c8c8d4;
    --ink-3: #8b8b9e;
    --accent: #c46e8f;
    --rule: rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* Soft radial glow behind everything — ties into deck aesthetic */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 20%,
        color-mix(in oklch, var(--accent) 30%, transparent), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 90%,
        color-mix(in oklch, var(--accent) 15%, transparent), transparent 60%);
    pointer-events: none;
  }

  /* ─── Header (always visible) ─── */
  header {
    flex: 0 0 auto;
    padding: 20px 20px 10px;
    z-index: 1;
  }
  .status-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  #status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #666;
    margin-right: 8px; vertical-align: middle;
    transition: background 300ms;
  }
  .connected #status-dot {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: dotPulse 1.8s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.85; }
    50%      { opacity: 1; transform: scale(1.2); }
  }

  /* ═══════════════════════════════════════════════════════════════
   * STATE A — BIG BANG LAUNCHPAD
   * Shown when deck.label === "Intro". Full-screen centered
   * circular button. Tapping sends {action:'start'}.
   * ═══════════════════════════════════════════════════════════════ */
  #launchpad {
    flex: 1 1 auto;
    display: flex;
    align-items: center; justify-content: center;
    padding: 0 20px;
    z-index: 1;
  }
  body:not(.on-intro) #launchpad { display: none; }

  #btn-bigbang {
    appearance: none;
    width: min(72vw, 380px);
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    border: none;
    padding: 0;
    font-family: 'Inter Tight', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    background: radial-gradient(circle at 35% 35%,
      color-mix(in oklch, var(--accent) 92%, #fce7f3) 0%,
      color-mix(in oklch, var(--accent) 75%, #7c3aed) 55%,
      color-mix(in oklch, var(--accent) 40%, #000) 100%);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.20),
      inset 0 -4px 14px rgba(0, 0, 0, 0.35),
      0  0  60px -8px  color-mix(in oklch, var(--accent) 85%, transparent),
      0  0 130px -18px color-mix(in oklch, var(--accent) 100%, transparent);
    animation: bigBangPulse 2.6s ease-in-out infinite;
    transition: transform 140ms cubic-bezier(.55, 0, .3, 1);
  }
  #btn-bigbang:active {
    transform: scale(0.95);
    animation-play-state: paused;
  }
  @keyframes bigBangPulse {
    0%, 100% {
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.20),
        inset 0 -4px 14px rgba(0, 0, 0, 0.35),
        0  0  60px -8px  color-mix(in oklch, var(--accent) 75%, transparent),
        0  0 130px -18px color-mix(in oklch, var(--accent) 85%, transparent);
    }
    50% {
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.28),
        inset 0 -4px 14px rgba(0, 0, 0, 0.35),
        0  0  80px -4px  color-mix(in oklch, var(--accent) 95%, transparent),
        0  0 170px -10px color-mix(in oklch, var(--accent) 100%, transparent);
    }
  }

  /* ═══════════════════════════════════════════════════════════════
   * STATE B — CONTROL SURFACE
   * Shown when deck.label !== "Intro". Top 3/4 = info + secondary
   * controls; bottom 1/4 = huge Next button (full-width, easy to
   * thumb without looking at the screen).
   * ═══════════════════════════════════════════════════════════════ */
  #controls-surface {
    flex: 1 1 auto;
    display: none;
    flex-direction: column;
    z-index: 1;
  }
  body:not(.on-intro) #controls-surface { display: flex; }

  /* Info zone — compact slide number + label at top */
  .info-zone {
    flex: 0 0 auto;
    padding: 24px 20px 0;
    text-align: center;
  }
  #slide-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 52px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin: 0;
  }
  #slide-num .of {
    color: var(--ink-3);
    font-size: 0.55em;
    letter-spacing: 0;
  }
  #slide-label {
    margin-top: 8px;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px;
    font-style: italic;
    color: var(--ink-2);
    opacity: 0.8;
  }

  /* Top flexible spacer — breathing room */
  .top-spacer { flex: 1 1 auto; }

  /* Secondary zone — Prev button + Home/End/Rescan row.
   * Sized for blind thumb operation: Prev ~62px tall, secondary
   * row buttons ~56px tall (exceeds Apple HIG 44pt minimum). */
  .secondary-zone {
    flex: 0 0 auto;
    padding: 0 16px 14px;
  }
  #btn-prev {
    display: block;
    width: 100%;
    min-height: 62px;
    padding: 20px 0;
    margin-bottom: 10px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--ink);
    background: var(--bg-2);
    border: 1px solid var(--rule);
    border-radius: 14px;
    cursor: pointer;
    transition: transform 120ms ease, background 160ms ease;
  }
  #btn-prev:active {
    transform: scale(0.98);
    background: color-mix(in oklch, var(--accent) 28%, var(--bg-2));
  }
  .secondary-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .secondary-row button {
    appearance: none;
    min-height: 56px;
    padding: 18px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-2);
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 10px;
    cursor: pointer;
    transition: background 160ms, color 160ms, transform 120ms;
  }
  .secondary-row button:active {
    background: rgba(255, 255, 255, 0.08);
    color: var(--ink);
    transform: scale(0.97);
  }

  /* Bottom 1/4 — huge Next button, edge-to-edge for blind thumb reach */
  #btn-next {
    appearance: none;
    flex: 0 0 auto;
    width: 100%;
    height: 25vh;
    min-height: 180px;
    padding: 0;
    border: none;
    border-radius: 0;
    font-family: 'Inter Tight', sans-serif;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #fff;
    background: linear-gradient(180deg,
      color-mix(in oklch, var(--accent) 85%, #f9a8d4) 0%,
      color-mix(in oklch, var(--accent) 60%, #7c3aed) 100%);
    box-shadow:
      0 -10px 40px -10px color-mix(in oklch, var(--accent) 70%, transparent),
      inset 0 2px 0 rgba(255, 255, 255, 0.18);
    cursor: pointer;
    transition: filter 140ms ease, transform 120ms ease;
  }
  #btn-next:active {
    transform: scale(0.985);
    filter: brightness(0.85);
  }
</style>
</head>
<body class="on-intro">

<header>
  <div class="status-row">
    <span><span id="status-dot"></span><span id="status-text">Connecting…</span></span>
    <span>AI-PE · deck remote</span>
  </div>
</header>

<!-- STATE A: Big Bang launchpad -->
<div id="launchpad">
  <button id="btn-bigbang" aria-label="Big Bang — start the presentation">
    Big Bang
  </button>
</div>

<!-- STATE B: Control surface -->
<div id="controls-surface">
  <div class="info-zone">
    <div id="slide-num"><span id="slide-idx">—</span><span class="of"> / <span id="slide-total">—</span></span></div>
    <div id="slide-label">—</div>
  </div>

  <div class="top-spacer" aria-hidden="true"></div>

  <div class="secondary-zone">
    <button id="btn-prev">◀&nbsp;&nbsp;Prev</button>
    <div class="secondary-row">
      <button id="btn-home">Home</button>
      <button id="btn-end">End</button>
      <button id="btn-rescan">Rescan</button>
    </div>
  </div>

  <button id="btn-next">Next&nbsp;&nbsp;▶</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"
        integrity="sha384-x0YgkOr/3UOZP2CRDxGW9e0Q+2Qjyr3uJrm4xU32Y7ZCNAo7Cc7bjhrZMi/dwczu"
        crossorigin="anonymous"></script>
<script src="remote.js"></script>

</body>
</html>
