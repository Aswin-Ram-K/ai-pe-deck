<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050511">
<title>Deck remote В· AI-PE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #050511;
    --bg-2: #0d0d22;
    --bg-3: #151532;
    --ink: #f5f5f0;
    --ink-2: #c8c8d4;
    --ink-3: #8b8b9e;
    --accent: #c46e8f;
    --rule: rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 20%,
        color-mix(in oklch, var(--accent) 30%, transparent), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 90%,
        color-mix(in oklch, var(--accent) 15%, transparent), transparent 60%);
    pointer-events: none;
  }

  /* в”Ђв”Ђв”Ђ Header (always visible) в”Ђв”Ђв”Ђ */
  header {
    flex: 0 0 auto;
    padding: 20px 20px 10px;
    z-index: 1;
  }
  body.counting-down header { display: none; }
  .status-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  #status-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #666;
    margin-right: 8px; vertical-align: middle;
    transition: background 300ms;
  }
  .connected #status-dot {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: dotPulse 1.8s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.85; }
    50%      { opacity: 1; transform: scale(1.2); }
  }

  /* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   * STATE A вЂ” BIG BANG LAUNCHPAD
   * в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
  #launchpad {
    flex: 1 1 auto;
    display: flex;
    align-items: center; justify-content: center;
    padding: 0 20px;
    z-index: 1;
  }
  body:not(.on-intro) #launchpad,
  body.counting-down #launchpad { display: none; }

  #btn-bigbang {
    appearance: none;
    width: min(72vw, 380px);
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    border: none;
    padding: 0;
    font-family: 'Inter Tight', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    background: radial-gradient(circle at 35% 35%,
      color-mix(in oklch, var(--accent) 92%, #fce7f3) 0%,
      color-mix(in oklch, var(--accent) 75%, #7c3aed) 55%,
      color-mix(in oklch, var(--accent) 40%, #000) 100%);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.20),
      inset 0 -4px 14px rgba(0, 0, 0, 0.35),
      0  0  60px -8px  color-mix(in oklch, var(--accent) 85%, transparent),
      0  0 130px -18px color-mix(in oklch, var(--accent) 100%, transparent);
    animation: bigBangPulse 2.6s ease-in-out infinite;
    transition: transform 140ms cubic-bezier(.55, 0, .3, 1);
  }
  #btn-bigbang:active {
    transform: scale(0.95);
    animation-play-state: paused;
  }
  @keyframes bigBangPulse {
    0%, 100% {
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.20),
        inset 0 -4px 14px rgba(0, 0, 0, 0.35),
        0  0  60px -8px  color-mix(in oklch, var(--accent) 75%, transparent),
        0  0 130px -18px color-mix(in oklch, var(--accent) 85%, transparent);
    }
    50% {
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.28),
        inset 0 -4px 14px rgba(0, 0, 0, 0.35),
        0  0  80px -4px  color-mix(in oklch, var(--accent) 95%, transparent),
        0  0 170px -10px color-mix(in oklch, var(--accent) 100%, transparent);
    }
  }

  /* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   * STATE C вЂ” COUNTDOWN (5-second takeover before cosmic intro)
   * Shown only while body.counting-down. Full-screen black;
   * giant numeral 5в†’4в†’3в†’2в†’1в†’GO with matching audio prompts.
   * Styled spartan because the presenter is wearing earphones
   * and primarily cues off audio вЂ” the visual is a backup.
   * в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
  #countdown-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    background: #050511;
  }
  body.counting-down #countdown-overlay { display: flex; }

  #countdown-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 26px;
  }
  #countdown-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: min(60vw, 320px);
    line-height: 0.9;
    font-weight: 400;
    color: var(--ink);
    text-shadow:
      0 0 60px color-mix(in oklch, var(--accent) 80%, transparent),
      0 0 160px color-mix(in oklch, var(--accent) 60%, transparent);
    animation: cdPulse 1s ease-out;
  }
  #countdown-num.is-go {
    color: #fff;
    font-family: 'Inter Tight', sans-serif;
    font-size: min(42vw, 240px);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-shadow:
      0 0 80px #fff,
      0 0 200px color-mix(in oklch, var(--accent) 90%, transparent);
  }
  @keyframes cdPulse {
    0%   { opacity: 0; transform: scale(1.35); }
    15%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 0.95; transform: scale(1); }
  }

  /* в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
   * STATE B вЂ” CONTROL SURFACE WITH TELEPROMPTER
   * Top 3/4 = scrolling speaker script (starts on slide-1 landing).
   * Thin top bar = slide N/13 В· label В· Prev В· Rescan.
   * Bottom 1/4 = huge Next button (unchanged).
   * в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
  #controls-surface {
    flex: 1 1 auto;
    display: none;
    flex-direction: column;
    z-index: 1;
    min-height: 0;
  }
  body:not(.on-intro):not(.counting-down) #controls-surface { display: flex; }

  .tele-bar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule);
    font-family: 'Fraunces', Georgia, serif;
  }
  #slide-num-mini {
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  #slide-num-mini .of {
    color: var(--ink-3);
    font-size: 0.7em;
  }
  #slide-label-mini {
    font-size: 14px;
    font-style: italic;
    color: var(--ink-2);
    opacity: 0.85;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .tele-bar button {
    appearance: none;
    width: 42px; height: 42px;
    padding: 0;
    font-size: 18px;
    color: var(--ink-2);
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 10px;
    cursor: pointer;
  }
  .tele-bar button:active {
    background: rgba(255, 255, 255, 0.08);
    color: var(--ink);
    transform: scale(0.96);
  }

  #teleprompter {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    padding: 22px 24px;
    min-height: 0;
    mask-image: linear-gradient(
      to bottom,
      transparent 0,
      #000 32px,
      #000 calc(100% - 64px),
      transparent 100%
    );
    -webkit-mask-image: linear-gradient(
      to bottom,
      transparent 0,
      #000 32px,
      #000 calc(100% - 64px),
      transparent 100%
    );
  }
  #tele-scroller {
    position: absolute;
    top: 0; left: 24px; right: 24px;
    will-change: transform;
    transition: transform 380ms cubic-bezier(.55, 0, .3, 1);
  }
  #tele-scroller.jumping { transition: transform 260ms ease-out; }
  #tele-scroller.smooth  { transition: none; }

  #tele-scroller section {
    padding-top: 8px;
    padding-bottom: 40px;
  }
  #tele-scroller section h3 {
    margin: 0 0 14px 0;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 15px;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-3);
    letter-spacing: 0.03em;
  }
  #tele-scroller section p {
    margin: 0 0 12px 0;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px;
    line-height: 1.45;
    color: var(--ink);
    font-weight: 400;
  }
  #tele-scroller section p.stage-dir {
    color: var(--ink-3);
    font-style: italic;
    font-size: 18px;
  }
  #tele-scroller section p.callback {
    color: color-mix(in oklch, var(--accent) 70%, var(--ink));
    font-size: 17px;
    letter-spacing: 0.02em;
  }
  #tele-scroller section blockquote {
    margin: 14px 0;
    padding: 8px 0 8px 16px;
    border-left: 3px solid var(--accent);
    font-family: 'Fraunces', Georgia, serif;
    font-size: 23px;
    font-style: italic;
    color: var(--ink);
    line-height: 1.4;
  }

  #tele-pre-start {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 0 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-3);
    background: var(--bg);
    z-index: 2;
  }
  body.tele-started #tele-pre-start { display: none; }

  /* Bottom 1/4 вЂ” huge Next button, edge-to-edge */
  #btn-next {
    appearance: none;
    flex: 0 0 auto;
    width: 100%;
    height: 25vh;
    min-height: 180px;
    padding: 0;
    border: none;
    border-radius: 0;
    font-family: 'Inter Tight', sans-serif;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #fff;
    background: linear-gradient(180deg,
      color-mix(in oklch, var(--accent) 85%, #f9a8d4) 0%,
      color-mix(in oklch, var(--accent) 60%, #7c3aed) 100%);
    box-shadow:
      0 -10px 40px -10px color-mix(in oklch, var(--accent) 70%, transparent),
      inset 0 2px 0 rgba(255, 255, 255, 0.18);
    cursor: pointer;
    transition: filter 140ms ease, transform 120ms ease;
  }
  #btn-next:active {
    transform: scale(0.985);
    filter: brightness(0.85);
  }
</style>
</head>
<body class="on-intro">

<header>
  <div class="status-row">
    <span><span id="status-dot"></span><span id="status-text">ConnectingвЂ¦</span></span>
    <span>AI-PE В· deck remote</span>
  </div>
</header>

<!-- STATE A: Big Bang launchpad -->
<div id="launchpad">
  <button id="btn-bigbang" aria-label="Big Bang вЂ” start the presentation">
    Big Bang
  </button>
</div>

<!-- STATE C: 5-second countdown overlay -->
<div id="countdown-overlay" aria-live="assertive">
  <div id="countdown-label">Big Bang in</div>
  <div id="countdown-num">5</div>
</div>

<!-- STATE B: Teleprompter + Next -->
<div id="controls-surface">
  <div class="tele-bar">
    <span id="slide-num-mini"><span id="slide-idx">вЂ”</span><span class="of"> / <span id="slide-total">вЂ”</span></span></span>
    <span id="slide-label-mini">вЂ”</span>
    <button id="btn-prev" aria-label="Previous slide">в—Ђ</button>
    <button id="btn-rescan" aria-label="Rescan connection">вџі</button>
  </div>

  <div id="teleprompter">
    <div id="tele-scroller" aria-live="polite"><!-- filled at load --></div>
    <div id="tele-pre-start">Waiting for slide 1вЂ¦</div>
  </div>

  <button id="btn-next">Next&nbsp;&nbsp;в–¶</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"
        integrity="sha384-x0YgkOr/3UOZP2CRDxGW9e0Q+2Qjyr3uJrm4xU32Y7ZCNAo7Cc7bjhrZMi/dwczu"
        crossorigin="anonymous"></script>
<script src="remote.js"></script>

</body>
</html>
